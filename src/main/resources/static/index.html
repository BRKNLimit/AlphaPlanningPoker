<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Alpha | Planning Poker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="grain-overlay"></div>
    
    <header>
        <div class="logo" style="color: var(--primary); font-weight: bold;">TEAM ALPHA</div>
        <div class="header-right">
            <div id="room-info" class="room-info hidden" style="display: flex; gap: 20px; align-items: center;">
                <div id="room-name-display" class="room-name">NAME</div>
                <div id="room-id-display" class="room-id" style="font-family: monospace;">#0000</div>
            </div>
            <div id="user-display" class="room-id">PLAYER</div>
        </div>
    </header>

    <div id="animation-layer" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10000;"></div>
    <div id="sweep-overlay" class="hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:2rem; color:gold; text-shadow:0 0 20px gold; z-index:10001; text-align:center;">CLEAN ESTIMATE!</div>

    <!-- Start Screen -->
    <main id="start-screen">
        <div class="pixel-coin" id="start-coin"></div>
        <div class="insert-coin-text">INSERT COIN</div>
    </main>

    <!-- Role Selection -->
    <main id="role-screen" class="hidden">
        <h1>CHOOSE YOUR DESTINY</h1>
        <div class="role-box">
            <div class="role-option" id="host-opt">
                <h2>HOST</h2>
                <p style="font-size: 0.6rem; margin-top: 10px;">START NEW SESSION</p>
            </div>
            <div class="role-option" id="join-opt">
                <h2>JOIN</h2>
                <div class="join-input-group">
                    <input type="text" id="room-input" placeholder="#XXXX" maxlength="5" style="margin-bottom: 10px; width: 100%;">
                    <button id="join-btn" style="padding: 10px;">ENTER</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Game Screen -->
    <main id="game-screen" class="hidden">
        <div class="reactions-bar" style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
            <button class="reaction-btn" data-emoji="🤡" style="width:auto; padding:5px 10px;">🤡</button>
            <button class="reaction-btn" data-emoji="💀" style="width:auto; padding:5px 10px;">💀</button>
            <button class="reaction-btn" data-emoji="🔥" style="width:auto; padding:5px 10px;">🔥</button>
            <button class="reaction-btn" data-emoji="☕" style="width:auto; padding:5px 10px;">☕</button>
        </div>

        <div id="participants" class="participants-grid">
            <!-- Participants will be injected here -->
        </div>

        <div class="controls">
            <div id="host-controls" class="hidden">
                <button id="reveal-btn">REVEAL</button>
                <button id="reset-btn">RESET</button>
            </div>
        </div>

        <div id="cards" class="cards-container">
            <div class="card" data-value="1">1</div>
            <div class="card" data-value="2">2</div>
            <div class="card" data-value="3">3</div>
            <div class="card" data-value="5">5</div>
            <div class="card" data-value="8">8</div>
            <div class="card" data-value="13">13</div>
            <div class="card" data-value="21">21</div>
            <div class="card" data-value="34">34</div>
            <div class="card" data-value="55">55</div>
            <div class="card" data-value="?">?</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
