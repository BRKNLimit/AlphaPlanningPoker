<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Alpha | Planning Poker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="grain-overlay"></div>
    
    <header>
        <div class="logo">TEAM ALPHA</div>
        <div id="room-info" class="room-info hidden">
            <div id="room-name-display" class="room-name">NAME</div>
            <div id="room-id-display" class="room-id">#0000</div>
        </div>
        <div class="header-right" style="display:flex; align-items:center; gap:20px;">
            <div id="chips-display" class="room-id" style="color: gold;">CHIPS: 0</div>
            <div id="user-display" class="room-id">LOGIN</div>
        </div>
    </header>

    <div id="animation-layer" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10000;"></div>
    <div id="sweep-overlay" class="hidden" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:2rem; color:gold; text-shadow:0 0 20px gold; z-index:10001; text-align:center;">CLEAN ESTIMATE!<br>X1.5 MULT!</div>

    <!-- Login Screen -->
    <main id="login-screen">
        <div class="auth-box">
            <h1>Login</h1>
            <input type="text" id="login-user" placeholder="Username" maxlength="20">
            <input type="password" id="login-pass" placeholder="Password" maxlength="20">
            <button id="login-btn">LOGIN</button>
            <p style="margin-top:20px; font-size: 0.6rem; cursor:pointer;" onclick="showScreen('register-screen')">New? Register here</p>
        </div>
    </main>

    <!-- Register Screen -->
    <main id="register-screen" class="hidden">
        <div class="auth-box">
            <h1>Register</h1>
            <input type="text" id="reg-user" placeholder="Username" maxlength="20">
            <input type="password" id="reg-pass" placeholder="Password" maxlength="20">
            <button id="reg-btn">REGISTER</button>
            <p style="margin-top:20px; font-size: 0.6rem; cursor:pointer;" onclick="showScreen('login-screen')">Back to Login</p>
        </div>
    </main>

    <!-- Join Screen (After Login) -->
    <main id="join-screen" class="hidden">
        <div class="auth-box">
            <h1>Join Session</h1>
            <input type="text" id="room-input" placeholder="Room ID (e.g. ALPHA)" maxlength="10">
            <button id="enter-btn">ENTER ROOM</button>
            <button id="admin-panel-btn" class="hidden" style="margin-top:10px; background:#333;">ADMIN PANEL</button>
        </div>
    </main>

    <!-- Admin Panel -->
    <main id="admin-screen" class="hidden">
        <div class="auth-box" style="max-width: 800px;">
            <h1>Admin Panel</h1>
            <div id="user-list" class="admin-user-list">
                <!-- Users here -->
            </div>
            <button onclick="showScreen('join-screen')" style="margin-top:20px;">BACK</button>
        </div>
    </main>

    <!-- Game Screen -->
    <main id="game-screen" class="hidden">
        <div class="reactions-bar" style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
            <button class="reaction-btn" data-emoji="🤡" style="width:auto; padding:5px 10px;">🤡</button>
            <button class="reaction-btn" data-emoji="💀" style="width:auto; padding:5px 10px;">💀</button>
            <button class="reaction-btn" data-emoji="🔥" style="width:auto; padding:5px 10px;">🔥</button>
            <button class="reaction-btn" data-emoji="☕" style="width:auto; padding:5px 10px;">☕</button>
        </div>

        <div id="participants" class="participants-grid">
            <!-- Participants will be injected here -->
        </div>

        <div class="betting-ui" style="display:flex; flex-direction:column; align-items:center; gap:10px; margin:20px 0;">
            <div style="display:flex; align-items:center; gap:10px;">
                <label style="font-size:0.6rem;">WAGER:</label>
                <input type="range" id="wager-slider" min="0" max="10" value="0" style="width:150px;">
                <span id="wager-amount" style="font-size:0.6rem; color:gold;">0</span>
            </div>
            <button id="all-in-btn" style="width:auto; padding:10px 20px; font-size:0.6rem; background:#444;">ALL IN</button>
        </div>

        <div class="controls">
            <div id="host-controls" class="hidden">
                <button id="reveal-btn">REVEAL</button>
                <button id="reset-btn">RESET</button>
            </div>
        </div>

        <div id="cards" class="cards-container">
            <div class="card" data-value="1">1</div>
            <div class="card" data-value="2">2</div>
            <div class="card" data-value="3">3</div>
            <div class="card" data-value="5">5</div>
            <div class="card" data-value="8">8</div>
            <div class="card" data-value="13">13</div>
            <div class="card" data-value="21">21</div>
            <div class="card" data-value="34">34</div>
            <div class="card" data-value="55">55</div>
            <div class="card" data-value="?">?</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
